<!DOCTYPE html>
<html>
<head>
<title>Registration Validation</title>

<script>
function validateForm() {

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let email = document.getElementById("email").value;

    // Regular Expressions
    let namePattern = /^[A-Za-z][A-Za-z0-9]{5,}$/;
    let mobilePattern = /^[0-9]{10}$/;
    let emailPattern = /^[a-zA-Z0-9._]+@[a-zA-Z]+\.[a-zA-Z]{2,}$/;

    if (!namePattern.test(name)) {
        alert("Invalid Name! Name must start with a letter and contain at least 6 characters.");
        return false;
    }

    if (!mobilePattern.test(mobile)) {
        alert("Invalid Mobile Number! It must contain exactly 10 digits.");
        return false;
    }

    if (!emailPattern.test(email)) {
        alert("Invalid Email Format!");
        return false;
    }

    alert("Registration Successful!");
    return true;
}
</script>

</head>

<body>

<h2>Registration Form</h2>

<form onsubmit="return validateForm()">

Name:
<input type="text" id="name"><br><br>

Mobile:
<input type="text" id="mobile"><br><br>

Email:
<input type="text" id="email"><br><br>

<input type="submit" value="Register">

</form>

</body>
</html>
