<!DOCTYPE html>
<html>
<head>
<title>Armstrong Number</title>
</head>
<body>

<script>

// Get number from user
let num = parseInt(prompt("Enter a number:"));
let original = num;
let sum = 0;

while (num > 0) {
    let digit = num % 10;        // get last digit
    sum = sum + digit * digit * digit;  // cube of digit
    num = Math.floor(num / 10);  // remove last digit
}

if (sum == original) {
    document.write(original + " is an Armstrong Number");
} else {
    document.write(original + " is not an Armstrong Number");
}

</script>

</body>
</html>
