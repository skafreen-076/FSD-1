<!DOCTYPE html>
<html>
<head>
    <title>CSS Text Styles</title>

    <style>
        h1 {
            color: green;
            text-align: center;
        }

        p {
            color: blue;
            font-size: 18px;
        }

        .highlight {
            color: red;
            font-style: italic;
        }
    </style>

</head>

<body>

    <h1>CSS Styling Example</h1>

    <p>
        CSS is used to style and design web pages.
    </p>

    <p class="highlight">
        This text is styled using a CSS class.
    </p>

</body>
</html>
