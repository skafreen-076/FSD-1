<!DOCTYPE html>
<html>
<head>
<title>Bank Denomination</title>
</head>
<body>

<script>

let amount = parseInt(prompt("Enter deposited amount:"));

let n100 = Math.floor(amount / 100);
amount = amount % 100;

let n50 = Math.floor(amount / 50);
amount = amount % 50;

let n20 = Math.floor(amount / 20);
amount = amount % 20;

let n10 = Math.floor(amount / 10);
amount = amount % 10;

let n5 = Math.floor(amount / 5);
amount = amount % 5;

let n2 = Math.floor(amount / 2);
amount = amount % 2;

let n1 = amount;

document.write("Denominations:<br>");
document.write(n100 + " - 100's<br>");
document.write(n50 + " - 50's<br>");
document.write(n20 + " - 20's<br>");
document.write(n10 + " - 10's<br>");
document.write(n5 + " - 5's<br>");
document.write(n2 + " - 2's<br>");
document.write(n1 + " - 1's<br>");

</script>

</body>
</html>
