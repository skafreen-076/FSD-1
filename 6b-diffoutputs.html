<!DOCTYPE html>
<html>
<head>
    <title>Different Output Methods</title>
</head>
<body>

    <h2>JavaScript Output Methods</h2>

    <p id="demo"></p>

    <button onclick="showAlert()">Show Alert</button>
    <button onclick="showConsole()">Show Console</button>
    <button onclick="showWrite()">Show Document Write</button>

    <script>
        // 1. Using innerHTML
        document.getElementById("demo").innerHTML = "Output using innerHTML";

        // 2. Using alert()
        function showAlert() {
            alert("Output using Alert Box");
        }

        // 3. Using console.log()
        function showConsole() {
            console.log("Output using Console");
        }

        // 4. Using document.write()
        function showWrite() {
            document.write("Output using document.write()");
        }
    </script>

</body>
</html>
