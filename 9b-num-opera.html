<!DOCTYPE html>
<html>
<head>
<title>Functions and Events</title>
<script>

function factorial() {
    let n = parseInt(document.getElementById("num").value);
    let fact = 1;

    for (let i = 1; i <= n; i++) {
        fact = fact * i;
    }

    document.getElementById("result").innerHTML = "Factorial: " + fact;
}

function fibonacci() {
    let n = parseInt(document.getElementById("num").value);
    let a = 0, b = 1, temp;
    let series = "0 1 ";

    for (let i = 2; i < n; i++) {
        temp = a + b;
        series += temp + " ";
        a = b;
        b = temp;
    }

    document.getElementById("result").innerHTML = "Fibonacci Series: " + series;
}

function prime() {
    let n = parseInt(document.getElementById("num").value);
    let primes = "";

    for (let i = 2; i <= n; i++) {
        let isPrime = true;

        for (let j = 2; j < i; j++) {
            if (i % j == 0) {
                isPrime = false;
                break;
            }
        }

        if (isPrime) {
            primes += i + " ";
        }
    }

    document.getElementById("result").innerHTML = "Prime Numbers: " + primes;
}

function palindrome() {
    let n = parseInt(document.getElementById("num").value);
    let original = n;
    let rev = 0;

    while (n > 0) {
        let digit = n % 10;
        rev = rev * 10 + digit;
        n = Math.floor(n / 10);
    }

    if (original == rev) {
        document.getElementById("result").innerHTML = "It is a Palindrome Number";
    } else {
        document.getElementById("result").innerHTML = "It is Not a Palindrome Number";
    }
}

</script>
</head>

<body>

<h3>JavaScript Functions Example</h3>

Enter Number:
<input type="text" id="num"><br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<p id="result"></p>

</body>
</html>
