<!DOCTYPE html>
<html>
<head>
<title>CSS Color References</title>

<style>

/* 1. Color Name */
.color-name {
  background-color: red;
  color: white;
  padding: 20px;
}

/* 2. HEX Value */
.hex-value {
  background-color: #00ff00;
  color: black;
  padding: 20px;
}

/* 3. RGB Value */
.rgb-value {
  background-color: rgb(0, 0, 255);
  color: white;
  padding: 20px;
}

/* 4. RGBA Value (with transparency) */
.rgba-value {
  background-color: rgba(225, 165, 0, 0.5);
  color: black;
  padding: 20px;
}

/* 5. HSL Value */
.hsl-value {
  background-color: hsl(300, 100%, 50%);
  color: white;
  padding: 20px;
}

/* 6. HSLA Value (with transparency) */
.hsla-value {
  background-color: hsla(180, 100%, 50%, 0.5);
  color: black;
  padding: 20px;
}

</style>
</head>

<body>

<h2>Different Ways to Reference Colors in CSS</h2>

<div class="color-name">Color Name (red)</div>
<div class="hex-value">HEX Value (#00ff00)</div>
<div class="rgb-value">RGB Value (rgb(0,0,255))</div>
<div class="rgba-value">RGBA Value (rgba with transparency)</div>
<div class="hsl-value">HSL Value (hsl)</div>
<div class="hsla-value">HSLA Value (hsla with transparency)</div>

</body>
</html>
