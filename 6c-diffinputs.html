<!DOCTYPE html>
<html>
<head>
    <title>Different Input Methods</title>
</head>
<body>

    <h2>JavaScript Input Methods</h2>

    <!-- 1. Input using Textbox -->
    <label>Enter your name:</label>
    <input type="text" id="nameInput">
    <button onclick="getTextboxValue()">Submit</button>
    <p id="output1"></p>

    <br><br>

    <!-- 2. Input using Prompt -->
    <button onclick="getPromptValue()">Enter Age (Prompt)</button>
    <p id="output2"></p>

    <script>
        // 1. Taking input from Textbox
        function getTextboxValue() {
            var name = document.getElementById("nameInput").value;
            document.getElementById("output1").innerHTML =
                "Hello " + name;
        }

        // 2. Taking input using Prompt
        function getPromptValue() {
            var age = prompt("Enter your age:");
            document.getElementById("output2").innerHTML =
                "Your age is " + age;
        }
    </script>

</body>
</html>
