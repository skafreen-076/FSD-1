<!DOCTYPE html>
<html>
<head>
<title>Loops Example</title>
</head>
<body>

<script>

// Using FOR loop
document.write("Numbers using FOR loop:<br>");
for (let i = 1; i <= 10; i++) {
    document.write(i + "<br>");
}

document.write("<br>");

// Using WHILE loop
document.write("Numbers using WHILE loop:<br>");
let j = 1;
while (j <= 10) {
    document.write(j + "<br>");
    j++;
}

document.write("<br>");

// Using DO-WHILE loop
document.write("Numbers using DO-WHILE loop:<br>");
let k = 1;
do {
    document.write(k + "<br>");
    k++;
} while (k <= 10);

</script>

</body>
</html>
