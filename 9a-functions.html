<html>
<head>
<title>Number Operations</title>
</head>

<body>

<h2>Number Operations</h2>

Enter a number:
<input type="number" id="num" onkeyup="display()">

<p id="fact"></p>
<p id="fib"></p>
<p id="prime"></p>
<p id="pal"></p>

<script>

function display(){
    var n = parseInt(document.getElementById("num").value);

    factorial(n);
    fibonacci(n);
    prime(n);
    palindrome(n);
}

// Factorial
function factorial(n){
    var fact = 1;

    for(var i=1;i<=n;i++){
        fact = fact * i;
    }

    document.getElementById("fact").innerHTML =
    "Factorial: " + fact;
}

// Fibonacci
function fibonacci(n){
    var a=0,b=1,temp;
    var series="";

    for(var i=1;i<=n;i++){
        series += a + " ";
        temp = a + b;
        a = b;
        b = temp;
    }

    document.getElementById("fib").innerHTML =
    "Fibonacci Series: " + series;
}

// Prime numbers
function prime(n){
    var primes="";

    for(var i=2;i<=n;i++){
        var flag=1;

        for(var j=2;j<i;j++){
            if(i%j==0){
                flag=0;
                break;
            }
        }

        if(flag==1){
            primes += i + " ";
        }
    }

    document.getElementById("prime").innerHTML =
    "Prime Numbers: " + primes;
}

// Palindrome
function palindrome(n){
    var num = n.toString();
    var rev = num.split("").reverse().join("");

    if(num == rev){
        document.getElementById("pal").innerHTML =
        n + " is Palindrome";
    }
    else{
        document.getElementById("pal").innerHTML =
        n + " is Not Palindrome";
    }
}

</script>

</body>
</html>
