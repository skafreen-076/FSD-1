<!DOCTYPE html>
<html>
<head>
    <title>Document Object Example</title>
</head>

<body>

<h1 id="heading">Welcome to JavaScript</h1>
<p id="para">This is a sample paragraph.</p>

<button onclick="changeContent()">Click Me</button>

<script>

// Function using document object
function changeContent() {

    // Using document.getElementById() method
    document.getElementById("heading").innerHTML = "Content Changed!";

    // Changing paragraph text
    document.getElementById("para").innerHTML = "You clicked the button.";

    // Using document property
    document.body.style.backgroundColor = "lightblue";

    // Displaying document title using property
    alert("Page Title is: " + document.title);
}

</script>

</body>
</html>
